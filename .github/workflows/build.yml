name: Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    name: ${{ matrix.os }} · Qt ${{ matrix.qt-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            qt-version: "6.2.4"
            qt-arch: linux_gcc_64

          - os: windows-2022
            qt-version: "6.5.3"
            qt-arch: win64_msvc2019_64

    steps:
      - uses: actions/checkout@v4

      # ── Linux: 系统 apt 安装 Qt ─────────────────────────
      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev \
            libqt6serialport6-dev \
            libqt6sql6-sqlite \
            qt6-base-dev-tools \
            libgl1-mesa-dev

      # ── Windows: aqt 安装 Qt ────────────────────────────
      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt-version }}
          arch: ${{ matrix.qt-arch }}
          modules: qtwebsockets qtserialport

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure -E Integration

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: PulseQt-Windows
          path: build/Release/PulseQt.exe
